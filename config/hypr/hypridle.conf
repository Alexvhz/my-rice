# Idle behaviour: dim/lock/screen-off.
general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid multiple locks
    before_sleep_cmd = loginctl lock-session     # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on   # wake screen on resume
}

listener {
    timeout = 600                                # 10 min -> lock
    on-timeout = loginctl lock-session
}

# NOTE: The DPMS "screen off" listener is intentionally DISABLED.
# On NVIDIA, turning the display off via DPMS frequently fails to wake back up,
# leaving you with a black screen. If you're NOT on NVIDIA (or once you've
# confirmed wake works), you can re-enable it by uncommenting this block:
#
# listener {
#     timeout = 630                              # screen off shortly after lock
#     on-timeout = hyprctl dispatch dpms off
#     on-resume  = hyprctl dispatch dpms on
# }
