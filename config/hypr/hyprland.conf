# =============================================================================
#  Hyprland — Atom OneDark rice
#  Docs: https://wiki.hyprland.org/Configuring/Variables/
#  Accent colour: #61afef (Atom OneDark blue)
# =============================================================================

# ------------------------------- Monitors ------------------------------------
# `monitor = name,resolution,position,scale`  —  see: hyprctl monitors
# Default: auto-detect at preferred resolution. Override per-machine in
# ~/.config/hypr/monitors.conf (git-ignored) so your repo stays portable.
monitor = eDP-1,3840x2160@60,0x0,2
monitor = ,preferred,auto,1
source = ~/.config/hypr/monitors.conf   # optional, safe if the file is empty

# ------------------------------ Environment ----------------------------------
# Cursor. A theme MUST be named or the cursor can render invisible on first boot.
env = XCURSOR_THEME,Adwaita
env = HYPRCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_QPA_PLATFORM,wayland;xcb
env = GDK_BACKEND,wayland,x11
env = MOZ_ENABLE_WAYLAND,1
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# ------------------------------ NVIDIA ---------------------------------------
# For a sane Wayland experience on NVIDIA (fixes invisible cursor, black
# windows, flicker). Harmless on non-NVIDIA, but you can delete this block.
# Requires: nvidia-dkms (or nvidia) + nvidia-utils + egl-wayland, and
# `nvidia_drm.modeset=1` on the kernel cmdline — see the README "NVIDIA" note.
env = ELECTRON_OZONE_PLATFORM_HINT,auto
# GBM_BACKEND is intentionally left unset (modern drivers don't need it and it
# can cause black windows). Uncomment ONLY if you get blank/black windows:

# The single most important line for the invisible-cursor bug on NVIDIA:
cursor {
    no_hardware_cursors = true
    enable_hyprcursor = false
}

# ------------------------------- Autostart -----------------------------------
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 &
exec-once = swaybg -i ~/.config/hypr/wallpapers/wall.png -m fill
exec-once = waybar &
exec-once = swaync &
exec-once = hypridle &
exec-once = nm-applet --indicator &
exec-once = blueman-applet &
exec-once = wl-paste --type text --watch cliphist store &
exec-once = wl-paste --type image --watch cliphist store &
# Restore last-used GTK theme etc.
exec-once = /usr/lib/xdg-desktop-portal-hyprland &

# --------------------------------- Input -------------------------------------
input {
    kb_layout = be
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
    }
}

# Touchpad workspace swipe (new gesture syntax, Hyprland 0.51+)
gesture = 3, horizontal, workspace

# ------------------------------ Look & feel ----------------------------------
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    # Active border: blue gradient. Inactive: muted grey.
    col.active_border = rgba(61afefff) rgba(56b6c2ff) 45deg
    col.inactive_border = rgba(3b4048aa)
    layout = dwindle
    resize_on_border = true
    allow_tearing = false
}

decoration {
    rounding = 12

    # Frosted-glass feel: translucent windows + blur.
    active_opacity = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = false
        popups = true
    }

    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = true
    bezier = smooth, 0.05, 0.9, 0.1, 1.0
    bezier = snappy, 0.2, 1.0, 0.3, 1.0
    animation = windows,     1, 5, smooth, slide
    animation = windowsOut,  1, 4, smooth, slide
    animation = border,      1, 8, snappy
    animation = fade,        1, 5, smooth
    animation = workspaces,  1, 5, smooth, slide
}

dwindle {
    preserve_split = true
}

master {
    new_status = master
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

# ------------------------------ Workspaces -----------------------------------
# Five workspaces to match the bar (1–5).
workspace = 1, default:true
workspace = 2
workspace = 3
workspace = 4
workspace = 5

# ------------------------------ Window rules ---------------------------------
# Keep image/video viewers fully opaque so media looks right.

# ================================ KEYBINDS ===================================
# $mod = SUPER (the Windows key)
$mod = SUPER
$term = alacritty
$menu = ~/.config/rofi/scripts/categories.sh
$categories = ~/.config/rofi/scripts/categories.sh

# --- Launching ---
bind = $mod, Return, exec, $term
bind = $mod, Space,  exec, $menu
bind = $mod, A,      exec, $categories          # categorized app menu
bind = $mod, E,      exec, thunar
bind = $mod, W,      exec, ~/.config/rofi/scripts/wallpaper.sh   # wallpaper switcher
bind = $mod, Q,      killactive,
bind = $mod SHIFT, Q, exit,
bind = $mod, F,      fullscreen,
bind = $mod, V,      togglefloating,
bind = $mod, P,      pseudo,
bind = $mod, T,      layoutmsg, togglesplit
bind = $mod, X,      exec, hyprlock             # lock screen
bind = $mod SHIFT, E, exec, ~/.config/rofi/scripts/power.sh             # power menu

# --- Clipboard history (rofi) ---
bind = $mod, C, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# --- Focus movement (arrows + vim keys) ---
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = $mod, H, movefocus, l
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d
# (vim 'l' would collide with lock/split above — use the right arrow to focus right)

# --- Move windows ---
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# --- Workspaces 1–5 ---
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# --- Move / resize with the mouse ---
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# --- Screenshots (grim + slurp) ---
bind = , Print,        exec, grim - | wl-copy                       # full screen -> clipboard
bind = $mod, Print,    exec, grim -g "$(slurp)" - | wl-copy         # region -> clipboard
bind = SHIFT, Print,   exec, grim ~/Pictures/screenshot-$(date +%F_%T).png

# --- Media / volume / brightness (work while locked too) ---
bindel = , XF86AudioRaiseVolume,  exec, pamixer -i 5
bindel = , XF86AudioLowerVolume,  exec, pamixer -d 5
bindl  = , XF86AudioMute,         exec, pamixer -t
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPrev,         exec, playerctl previous
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# --- Toggle the notification center ---
bind = $mod, N, exec, swaync-client -t -sw

# Machine-specific overrides (git-ignored). Put per-laptop tweaks here.
source = ~/.config/hypr/local.conf





# --- Soft blur on layer surfaces (matte) ---
layerrule = blur on, match:namespace waybar
layerrule = blur on, match:namespace rofi
layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window
