# Lock screen — Atom OneDark.
background {
    monitor =
    path = ~/.config/hypr/wallpapers/wall.png
    blur_passes = 3
    blur_size = 8
    color = rgb(282c34)
}

input-field {
    monitor =
    size = 280, 55
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgb(61afef)          # blue accent
    inner_color = rgb(282c34)
    font_color = rgb(abb2bf)
    fade_on_empty = true
    placeholder_text = <i>password…</i>
    position = 0, -40
    halign = center
    valign = center
    rounding = 12
}

# Big clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgb(abb2bf)
    font_size = 90
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    color = rgb(61afef)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 40
    halign = center
    valign = center
}
